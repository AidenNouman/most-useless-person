<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Useless Scanner 😆</title>

  <style>
    body {
      background: black;
      color: #00ffcc;
      font-family: monospace;
      text-align: center;
      padding: 15px;
      margin: 0;
      transition: 0.3s;
    }

    h1 {
      font-size: 1.8em;
      animation: glitch 1s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 2px red; }
      50% { text-shadow: -2px -2px blue; }
      100% { text-shadow: 2px 2px red; }
    }

    button {
      width: 90%;
      max-width: 300px;
      padding: 12px;
      margin: 8px auto;
      display: block;
      border: 2px solid #00ffcc;
      background: transparent;
      color: #00ffcc;
      font-size: 16px;
      border-radius: 8px;
      transition: 0.2s;
    }

    button:active {
      background: #00ffcc;
      color: black;
    }

    input {
      width: 90%;
      max-width: 300px;
      padding: 10px;
      margin: 10px auto;
      display: block;
      border-radius: 6px;
      border: none;
      text-align: center;
    }

    #output {
      margin-top: 15px;
      font-size: 1.1em;
      min-height: 40px;
    }

    #barContainer {
      width: 90%;
      margin: 15px auto;
      border: 1px solid #00ffcc;
      height: 18px;
      border-radius: 10px;
      overflow: hidden;
    }

    #bar {
      width: 0%;
      height: 100%;
      background: #00ffcc;
    }

    .popup {
      position: fixed;
      background: #111;
      border: 1px solid red;
      padding: 8px;
      color: red;
      font-size: 12px;
      border-radius: 6px;
    }

    .signature {
      margin-top: 30px;
      font-size: 12px;
      color: gray;
    }

    @keyframes shake {
      0% { transform: translate(2px, 2px); }
      25% { transform: translate(-2px, -2px); }
      50% { transform: translate(2px, -2px); }
      75% { transform: translate(-2px, 2px); }
      100% { transform: translate(2px, 2px); }
    }

    .shake {
      animation: shake 0.3s;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.5em; }
      button { font-size: 15px; padding: 10px; }
    }
  </style>
</head>

<body>

  <h1>🏆 USELESS SCANNER 😆</h1>
  <p>Ultra AI v0.0001 (100% fake)</p>

  <input id="name" placeholder="বন্ধুর নাম লিখ 😈">

  <button onclick="scan()">Scan Now</button>
  <button onclick="roast()">Roast দাও 😈</button>
  <button onclick="achievement()">Achievement 😎</button>
  <button id="runaway">ধরতে পারলে ধর 😜</button>

  <div id="output"></div>

  <div id="barContainer">
    <div id="bar"></div>
  </div>

  <p class="signature">
    Made by another Berozgar Person Swarup 😎
  </p>

<script>
const output = document.getElementById("output");
const bar = document.getElementById("bar");

// Scan
function scan() {
  let progress = 0;
  output.innerText = "স্ক্যান চলছে... 🧠";

  const interval = setInterval(() => {
    progress += Math.random() * 20;
    bar.style.width = progress + "%";

    if (progress >= 100) {
      clearInterval(interval);
      output.innerText = "Result: তুই-ই 😱";

      document.body.classList.add("shake");
      setTimeout(() => document.body.classList.remove("shake"), 300);

      spamPopups();
    }
  }, 300);
}

// Roast
const roasts = [
  "তোর স্পিড Internet Explorer থেকেও কম 😆",
  "তুই useless না, bad example হিসেবে ভালো 😜",
  "আলসেমি করলে gold পেতিস 😂",
  "তুই ঢুকলেই WiFi কমে যায় 📶",
  "Auto-correct-ও হাল ছেড়ে দেয় 🤣"
];

function roast() {
  const name = document.getElementById("name").value || "তুই";
  const r = roasts[Math.floor(Math.random() * roasts.length)];
  const line = name + ", " + r;

  output.innerText = line;
  speak(line);
  flashBg();
}

// Achievement
const achievements = [
  "Achievement: ৫ সেকেন্ড নষ্ট 😎",
  "Achievement: Button expert 😆",
  "Achievement: এখনো আছিস? 😐",
  "Achievement: Full useless 🤡"
];

function achievement() {
  const a = achievements[Math.floor(Math.random() * achievements.length)];
  output.innerText = a;
  confetti();
}

// Voice
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "bn-IN";
  speechSynthesis.speak(speech);
}

// Background flash
function flashBg() {
  const colors = ["#111", "#220000", "#002222", "#222200"];
  document.body.style.background =
    colors[Math.floor(Math.random() * colors.length)];
}

// Runaway button
const btn = document.getElementById("runaway");
btn.addEventListener("click", () => {
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
});

// Popups
function spamPopups() {
  for (let i = 0; i < 4; i++) {
    const div = document.createElement("div");
    div.className = "popup";
    div.innerText = "⚠ Brain not found 😂";
    div.style.top = Math.random() * window.innerHeight + "px";
    div.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(div);

    setTimeout(() => div.remove(), 2500);
  }
}

// Confetti
function confetti() {
  for (let i = 0; i < 20; i++) {
    let div = document.createElement("div");
    div.style.position = "fixed";
    div.style.width = "5px";
    div.style.height = "5px";
    div.style.background = "#00ffcc";
    div.style.top = Math.random() * window.innerHeight + "px";
    div.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(div);

    setTimeout(() => div.remove(), 1000);
  }
}

// Tap counter
let taps = 0;
document.body.addEventListener("click", () => {
  taps++;
  if (taps === 10) output.innerText = "অনেক চাপছিস 🤨";
  if (taps === 20) output.innerText = "কাজ নাই নাকি? 😂";
});
</script>

</body>
</html>
