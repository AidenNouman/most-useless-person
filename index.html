<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Most Useless Person Ever</title>

  <style>
    body {
      background: black;
      color: #00ffcc;
      font-family: monospace;
      text-align: center;
      padding: 15px;
      margin: 0;
    }

    h1 {
      font-size: 1.8em;
      animation: glitch 1s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 2px red; }
      50% { text-shadow: -2px -2px blue; }
      100% { text-shadow: 2px 2px red; }
    }

    button {
      width: 90%;
      max-width: 300px;
      padding: 12px;
      margin: 8px auto;
      display: block;
      border: 2px solid #00ffcc;
      background: transparent;
      color: #00ffcc;
      font-size: 16px;
      border-radius: 8px;
    }

    button:active {
      background: #00ffcc;
      color: black;
    }

    #output {
      margin-top: 15px;
      font-size: 1.1em;
      min-height: 40px;
    }

    #barContainer {
      width: 90%;
      margin: 15px auto;
      border: 1px solid #00ffcc;
      height: 18px;
      border-radius: 10px;
      overflow: hidden;
    }

    #bar {
      width: 0%;
      height: 100%;
      background: #00ffcc;
    }

    #runaway {
      position: relative;
    }

    .popup {
      position: fixed;
      background: #111;
      border: 1px solid red;
      padding: 8px;
      color: red;
      font-size: 12px;
      border-radius: 6px;
    }

    .signature {
      margin-top: 30px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

  <h1>🏆 MOST USELESS PERSON 😆</h1>
  <p>Ultra AI Scanner (100% fake)</p>

  <button onclick="scan()">Scan Now</button>
  <button onclick="roast()">Roast দাও 😈</button>
  <button onclick="achievement()">Achievement 😎</button>
  <button id="runaway">ধরতে পারলে ধর 😜</button>

  <div id="output"></div>

  <div id="barContainer">
    <div id="bar"></div>
  </div>

  <p class="signature">
    Made by another Berozgar Person Swarup 😎
  </p>

<script>
const output = document.getElementById("output");
const bar = document.getElementById("bar");

function scan() {
  let progress = 0;
  output.innerText = "স্ক্যান চলছে... 🧠";

  const interval = setInterval(() => {
    progress += Math.random() * 20;
    bar.style.width = progress + "%";

    if (progress >= 100) {
      clearInterval(interval);
      output.innerText = "Result: তুই-ই 😱 (চিন্তা করিস না, মজা করছি 😆)";
      spamPopups();
    }
  }, 300);
}

const roasts = [
  "তোর স্পিড Internet Explorer থেকেও কম 😆",
  "তুই useless না, bad example হিসেবে ব্যবহার করা যায় 😜",
  "আলসেমি যদি sport হত, তুই ২য় হতিস... কারণ চেষ্টা করতিস না 😏",
  "তুই ঢুকলেই WiFi signal কমে যায় 📶",
  "Auto-correct-ও তোকে ঠিক করতে পারে না 😂"
];

function roast() {
  const r = roasts[Math.floor(Math.random() * roasts.length)];
  output.innerText = r;
}

const achievements = [
  "Achievement: ৫ সেকেন্ড নষ্ট 😎",
  "Achievement: Button চাপার expert 😆",
  "Achievement: এখনো আছিস? 😐",
  "Achievement: Full useless mode 🤡",
  "Achievement: No regret 😂"
];

function achievement() {
  const a = achievements[Math.floor(Math.random() * achievements.length)];
  output.innerText = a;
}

// Mobile-friendly runaway (tap instead of hover)
const btn = document.getElementById("runaway");
btn.addEventListener("click", () => {
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
});

// Popups
function spamPopups() {
  for (let i = 0; i < 4; i++) {
    const div = document.createElement("div");
    div.className = "popup";
    div.innerText = "⚠ Brain not found 😂";
    div.style.top = Math.random() * window.innerHeight + "px";
    div.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(div);

    setTimeout(() => div.remove(), 2500);
  }
}
</script>

</body>
</html>
